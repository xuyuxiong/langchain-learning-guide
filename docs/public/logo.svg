<?xml version="1.0" encoding="UTF-8"?>
<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  
  <!-- 抽象链条 - 几何晶体风格 -->
  <g transform="translate(90,90)">
    <!-- 主六边形 -->
    <path d="M -40 0 L -20 -35 L 20 -35 L 40 0 L 20 35 L -20 35 Z" 
          fill="none" stroke="url(#grad1)" stroke-width="2.5"/>
    
    <!-- 内六边形 -->
    <path d="M -25 0 L -15 -20 L 15 -20 L 25 0 L 15 20 L -15 20 Z" 
          fill="none" stroke="url(#grad2)" stroke-width="2"/>
    
    <!-- 连接线 -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="url(#grad1)" stroke-width="1.5"/>
    <line x1="-15" y1="-26" x2="15" y2="26" stroke="url(#grad1)" stroke-width="1.5"/>
    <line x1="-15" y1="26" x2="15" y2="-26" stroke="url(#grad1)" stroke-width="1.5"/>
    
    <!-- 中心圆 -->
    <circle cx="0" cy="0" r="8" fill="url(#grad1)" opacity="0.8"/>
  </g>
</svg>